server:
  port: 8080

spring.application:
    name: yudream-admin

spring.data:
  mongodb:
    uri: ${MONGO_URI}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: ${REDIS_TIMEOUT:2000ms}
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:8}
        max-idle: ${REDIS_POOL_MAX_IDLE:8}
        min-idle: ${REDIS_POOL_MIN_IDLE:0}

spring.mail:
  host: ${MAIL_HOST:smtp.qq.com}      # 必须有 host，否则自动配置跳过
  port: ${MAIL_PORT:465}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  protocol: smtp
  default-encoding: UTF-8
  properties:
    mail.smtp.auth: true
    mail.smtp.ssl.enable: ${MAIL_SSL_ENABLE:true}          # 465 端口通常需要 SSL
    mail.smtp.starttls.enable: ${MAIL_STARTTLS_ENABLE:false}
    mail.smtp.connectiontimeout: 5000
    mail.smtp.timeout: 5000
    mail.smtp.writetimeout: 5000

spring.thymeleaf:
  prefix: classpath:/templates/
  suffix: .html
  mode: HTML
  cache: false

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 50MB

logging:
  level:
    online.yudream.base: debug
    org.springframework.data.mongodb: info

springdoc:
  cache:
    disabled: true
  swagger-ui:
    disable-swagger-default-url: true
    query-config-enabled: true
    url: /v3/api-docs
  api-docs:
    path: /v3/api-docs

# 雪花算法配置
snowflake:
  data-center-id: ${SNOWFLAKE_DCI:1}
  machine-id: ${SNOWFLAKE_MI:1}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME}}

yudream.cache:
  key-prefix: ${CACHE_KEY_PREFIX:yudream}
  enabled: ${CACHE_ENABLED:true}
  default-null-expire: ${CACHE_DEFAULT_NULL_EXPIRE:60}
  l1:
    enabled: ${CACHE_L1_ENABLED:false}
    maximum-size: ${CACHE_L1_MAX_SIZE:10000}
    expire-after-write: ${CACHE_L1_EXPIRE:60}
  metrics:
    enabled: ${CACHE_METRICS_ENABLED:true}
    aggregate-by-prefix: ${CACHE_METRICS_AGGREGATE:true}

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-cookie: false
  is-read-header: true

# 应用基础地址（用于生成邮件验证链接）
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  web-url: ${APP_WEB_URL:${APP_BASE_URL:http://localhost:9000}}

# Web 请求日志配置
yudream.web.log:
  enabled: ${WEB_LOG_ENABLED:true}
  prefix: ${WEB_LOG_PREFIX:YuDreamAdmin}

yudream.system.seed:
  menu:
    sync-mode: ${SYSTEM_SEED_MENU_SYNC_MODE:MISSING_ONLY}

yudream.platform.capabilities:
  api-docs:
    enabled: ${PLATFORM_API_DOCS_ENABLED:true}
  cms:
    enabled: ${PLATFORM_CMS_ENABLED:true}
  form:
    enabled: ${PLATFORM_FORM_ENABLED:true}
  document-template:
    enabled: ${PLATFORM_DOCUMENT_TEMPLATE_ENABLED:true}
  integration:
    enabled: ${PLATFORM_INTEGRATION_ENABLED:true}
  sse:
    enabled: ${PLATFORM_SSE_ENABLED:true}
  websocket:
    enabled: ${PLATFORM_WEBSOCKET_ENABLED:true}
  rabbitmq:
    enabled: ${PLATFORM_RABBITMQ_ENABLED:true}
  neo4j:
    enabled: ${PLATFORM_NEO4J_ENABLED:true}
  ai:
    enabled: ${PLATFORM_AI_ENABLED:true}
  dataviz:
    enabled: ${PLATFORM_DATAVIZ_ENABLED:true}
  satori:
    enabled: ${PLATFORM_SATORI_ENABLED:true}
  message-render:
    enabled: ${PLATFORM_MESSAGE_RENDER_ENABLED:true}

yudream.platform.ai.client:
  connect-timeout: ${PLATFORM_AI_CONNECT_TIMEOUT:30s}
  read-timeout: ${PLATFORM_AI_READ_TIMEOUT:10m}
  sse-timeout: ${PLATFORM_AI_SSE_TIMEOUT:10m}

yudream.platform.render:
  base-url: ${MESSAGE_RENDER_BASE_URL:http://localhost:3000}
  token: ${MESSAGE_RENDER_TOKEN:}
  timeout: ${MESSAGE_RENDER_TIMEOUT:30s}

yudream.storage.s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:rustfsadmin}
  secret-key: ${S3_SECRET_KEY:rustfsadmin}
  bucket: ${S3_BUCKET:yudream-admin}
  region: ${S3_REGION:us-east-1}
  path-style-access: ${S3_PATH_STYLE_ACCESS:true}
