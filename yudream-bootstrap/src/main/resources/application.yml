server:
  port: 8080

spring.application:
    name: yudream-admin

spring.data:
  mongodb:
    uri: ${MONGO_URI}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: ${REDIS_TIMEOUT:2000ms}
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:8}
        max-idle: ${REDIS_POOL_MAX_IDLE:8}
        min-idle: ${REDIS_POOL_MIN_IDLE:0}

spring.rabbitmq:
  host: ${RABBITMQ_HOST:localhost}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USERNAME:guest}
  password: ${RABBITMQ_PASSWORD:guest}
  virtual-host: ${RABBITMQ_VHOST:/}
  connection-timeout: ${RABBITMQ_CONNECTION_TIMEOUT:3000ms}

spring.mail:
  host: ${MAIL_HOST:smtp.qq.com}      # 必须有 host，否则自动配置跳过
  port: ${MAIL_PORT:465}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  protocol: smtp
  default-encoding: UTF-8
  properties:
    mail.smtp.auth: true
    mail.smtp.ssl.enable: ${MAIL_SSL_ENABLE:true}          # 465 端口通常需要 SSL
    mail.smtp.starttls.enable: ${MAIL_STARTTLS_ENABLE:false}
    mail.smtp.connectiontimeout: 5000
    mail.smtp.timeout: 5000
    mail.smtp.writetimeout: 5000

spring.thymeleaf:
  prefix: classpath:/templates/
  suffix: .html
  mode: HTML
  cache: false

logging:
  level:
    online.yudream.base: debug
    org.springframework.data.mongodb: info

# 雪花算法配置
snowflake:
  data-center-id: ${SNOWFLAKE_DCI:1}
  machine-id: ${SNOWFLAKE_MI:1}

mail:
  from: ${MAIL_FROM:${MAIL_USERNAME}}

yudream.cache:
  key-prefix: ${CACHE_KEY_PREFIX:yudream}
  enabled: ${CACHE_ENABLED:true}
  default-null-expire: ${CACHE_DEFAULT_NULL_EXPIRE:60}
  l1:
    enabled: ${CACHE_L1_ENABLED:false}
    maximum-size: ${CACHE_L1_MAX_SIZE:10000}
    expire-after-write: ${CACHE_L1_EXPIRE:60}
  metrics:
    enabled: ${CACHE_METRICS_ENABLED:true}
    aggregate-by-prefix: ${CACHE_METRICS_AGGREGATE:true}

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-cookie: false
  is-read-header: true

# 应用基础地址（用于生成邮件验证链接）
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  web-url: ${APP_WEB_URL:${APP_BASE_URL:http://localhost:9000}}

# Web 请求日志配置
yudream.web.log:
  enabled: ${WEB_LOG_ENABLED:true}
  prefix: ${WEB_LOG_PREFIX:YuDreamAdmin}

yudream.storage.s3:
  endpoint: ${S3_ENDPOINT:http://localhost:9000}
  access-key: ${S3_ACCESS_KEY:rustfsadmin}
  secret-key: ${S3_SECRET_KEY:rustfsadmin}
  bucket: ${S3_BUCKET:yudream-admin}
  region: ${S3_REGION:us-east-1}
  path-style-access: ${S3_PATH_STYLE_ACCESS:true}
