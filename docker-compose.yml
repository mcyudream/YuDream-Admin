# YuDream Admin 生产部署编排（不含中间件）
# 用法：
#   docker compose pull
#   docker compose up -d
#
# watchtower 会自动检测 GitLab 容器仓库镜像更新并重启对应服务。

services:
  backend:
    image: ${CI_REGISTRY_IMAGE:-registry.yudream.online/yudream/yudreamadmin}/backend:${TAG:-latest}
    container_name: yudream-backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # 应用配置，按需覆盖
      - SERVER_PORT=8080
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}
      - APP_WEB_URL=${APP_WEB_URL:-http://localhost}
      - WEB_LOG_ENABLED=${WEB_LOG_ENABLED:-true}
      - WEB_LOG_PREFIX=${WEB_LOG_PREFIX:-YuDreamAdmin}
      - SNOWFLAKE_DCI=${SNOWFLAKE_DCI:-1}
      - SNOWFLAKE_MI=${SNOWFLAKE_MI:-1}
      - SYSTEM_SEED_MENU_SYNC_MODE=${SYSTEM_SEED_MENU_SYNC_MODE:-MISSING_ONLY}
      # 中间件连接信息（示例，按需修改）
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_TIMEOUT=${REDIS_TIMEOUT:-2000ms}
      - REDIS_POOL_MAX_ACTIVE=${REDIS_POOL_MAX_ACTIVE:-8}
      - REDIS_POOL_MAX_IDLE=${REDIS_POOL_MAX_IDLE:-8}
      - REDIS_POOL_MIN_IDLE=${REDIS_POOL_MIN_IDLE:-0}
      - MONGO_URI=${MONGO_URI:-}
      - MAIL_HOST=${MAIL_HOST:-smtp.qq.com}
      - MAIL_PORT=${MAIL_PORT:-465}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_SSL_ENABLE=${MAIL_SSL_ENABLE:-true}
      - MAIL_STARTTLS_ENABLE=${MAIL_STARTTLS_ENABLE:-false}
      - CACHE_KEY_PREFIX=${CACHE_KEY_PREFIX:-yudream}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_DEFAULT_NULL_EXPIRE=${CACHE_DEFAULT_NULL_EXPIRE:-60}
      - CACHE_L1_ENABLED=${CACHE_L1_ENABLED:-false}
      - CACHE_L1_MAX_SIZE=${CACHE_L1_MAX_SIZE:-10000}
      - CACHE_L1_EXPIRE=${CACHE_L1_EXPIRE:-60}
      - CACHE_METRICS_ENABLED=${CACHE_METRICS_ENABLED:-true}
      - CACHE_METRICS_AGGREGATE=${CACHE_METRICS_AGGREGATE:-true}
      - PLATFORM_API_DOCS_ENABLED=${PLATFORM_API_DOCS_ENABLED:-true}
      - PLATFORM_CMS_ENABLED=${PLATFORM_CMS_ENABLED:-true}
      - PLATFORM_FORM_ENABLED=${PLATFORM_FORM_ENABLED:-true}
      - PLATFORM_DOCUMENT_TEMPLATE_ENABLED=${PLATFORM_DOCUMENT_TEMPLATE_ENABLED:-true}
      - PLATFORM_INTEGRATION_ENABLED=${PLATFORM_INTEGRATION_ENABLED:-true}
      - PLATFORM_SSE_ENABLED=${PLATFORM_SSE_ENABLED:-true}
      - PLATFORM_WEBSOCKET_ENABLED=${PLATFORM_WEBSOCKET_ENABLED:-true}
      - PLATFORM_RABBITMQ_ENABLED=${PLATFORM_RABBITMQ_ENABLED:-true}
      - PLATFORM_NEO4J_ENABLED=${PLATFORM_NEO4J_ENABLED:-true}
      - PLATFORM_AI_ENABLED=${PLATFORM_AI_ENABLED:-true}
      - PLATFORM_DATAVIZ_ENABLED=${PLATFORM_DATAVIZ_ENABLED:-true}
      - PLATFORM_SATORI_ENABLED=${PLATFORM_SATORI_ENABLED:-true}
      - PLATFORM_MESSAGE_RENDER_ENABLED=${PLATFORM_MESSAGE_RENDER_ENABLED:-true}
      - MESSAGE_RENDER_BASE_URL=${MESSAGE_RENDER_BASE_URL:-http://render-server:3000}
      - MESSAGE_RENDER_TOKEN=${MESSAGE_RENDER_TOKEN:-}
      - MESSAGE_RENDER_TIMEOUT=${MESSAGE_RENDER_TIMEOUT:-30s}
      - YUDREAM_SATORI_CREDENTIAL_KEY=${YUDREAM_SATORI_CREDENTIAL_KEY:-}
      - PLATFORM_AI_CONNECT_TIMEOUT=${PLATFORM_AI_CONNECT_TIMEOUT:-30s}
      - PLATFORM_AI_READ_TIMEOUT=${PLATFORM_AI_READ_TIMEOUT:-10m}
      - PLATFORM_AI_SSE_TIMEOUT=${PLATFORM_AI_SSE_TIMEOUT:-10m}
      - YUDREAM_PLATFORM_PLUGIN_ENABLED=${YUDREAM_PLATFORM_PLUGIN_ENABLED:-true}
      - YUDREAM_PLATFORM_PLUGIN_DIRECTORIES=${YUDREAM_PLATFORM_PLUGIN_DIRECTORIES:-plugins}
      - YUDREAM_PLATFORM_PLUGIN_UPLOAD_DIRECTORY=${YUDREAM_PLATFORM_PLUGIN_UPLOAD_DIRECTORY:-plugins}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://localhost:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-rustfsadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-rustfsadmin}
      - S3_BUCKET=${S3_BUCKET:-yudream-admin}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_PATH_STYLE_ACCESS=${S3_PATH_STYLE_ACCESS:-true}
    volumes:
      # 将宿主机 ./plugins 目录挂载到容器，方便单独更新插件 JAR
      - ./plugins:/app/plugins
    networks:
      - yudream

  render-server:
    build:
      context: ./yudream-render-server
    image: ${CI_REGISTRY_IMAGE:-registry.yudream.online/yudream/yudreamadmin}/render-server:${TAG:-latest}
    container_name: yudream-render-server
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - RENDER_HOST=0.0.0.0
      - RENDER_PORT=3000
      - RENDER_TOKEN=${MESSAGE_RENDER_TOKEN:-}
      - RENDER_CONCURRENCY=${RENDER_CONCURRENCY:-2}
      - RENDER_TIMEOUT_MS=${RENDER_TIMEOUT_MS:-30000}
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    networks:
      - yudream

  frontend:
    image: ${CI_REGISTRY_IMAGE:-registry.yudream.online/yudream/yudreamadmin}/frontend:${TAG:-latest}
    container_name: yudream-frontend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - yudream

  # 自动监控镜像更新并重启服务
  watchtower:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/ghcr.io/containrrr/watchtower:amd64-1.7.1
    container_name: yudream-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # 每 300 秒（5 分钟）检查一次更新
      - WATCHTOWER_POLL_INTERVAL=300
      # 只监控带 com.centurylinklabs.watchtower.enable=true 标签的容器
      - WATCHTOWER_LABEL_ENABLE=true
      # 更新后自动清理旧镜像
      - WATCHTOWER_CLEANUP=true
      # 可选：收到更新后先执行 pre-update 命令（如备份）
      # - WATCHTOWER_LIFECYCLE_HOOKS=true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - yudream

networks:
  yudream:
    driver: bridge
