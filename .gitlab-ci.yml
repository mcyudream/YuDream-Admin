# YuDream Admin Core GitLab CI/CD Pipeline

.node_image: &node_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/node:24.15.0-bookworm
.maven_image: &maven_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/maven:3.9-eclipse-temurin-21
.docker_cli_image: &docker_cli_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/docker:cli
.docker_dind_image: &docker_dind_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/docker:dind

default:
  tags:
    - shared

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  PNPM_IGNORE_PACKAGE_MANAGER_VERSION: "true"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_SETTINGS_PATH: "ci/maven-settings-nexus.xml"
  NEXUS_BASE_URL: "https://nexus.yudream.online"
  NEXUS_MAVEN_PUBLIC_URL: "$NEXUS_BASE_URL/repository/maven-public/"
  NEXUS_MAVEN_RELEASES_URL: "$NEXUS_BASE_URL/repository/maven-releases/"
  NEXUS_MAVEN_SNAPSHOTS_URL: "$NEXUS_BASE_URL/repository/maven-snapshots/"
  NEXUS_NPM_PUBLIC_URL: "$NEXUS_BASE_URL/repository/npm-public/"
  NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
  COREPACK_NPM_REGISTRY: "https://registry.npmmirror.com"
  YUDREAM_NPM_REGISTRY: "$NEXUS_NPM_PUBLIC_URL"
  FRONTEND_DIR: "yudream-frontend"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - yudream-frontend/.pnpm-store/
    - .m2/repository/
  policy: pull-push

stages:
  - validate-boundary
  - build-backend
  - build-frontend-main
  - publish-packages
  - verify-packages
  - artifacts
  - build-images

validate:repo-split:
  stage: validate-boundary
  image: alpine:3.20
  script:
    - sh ci/verify-core-plugin-decoupling.sh

validate:contract-packages:
  stage: validate-boundary
  image: alpine:3.20
  script:
    - sh ci/verify-contract-packages.sh

validate:contract-package-tarballs:
  stage: validate-boundary
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - sh ci/verify-contract-package-tarballs.sh

validate:contract-publish-pipeline:
  stage: validate-boundary
  image: alpine:3.20
  script:
    - sh ci/verify-core-contract-publish-pipeline.sh

validate:plugin-repo-template:
  stage: validate-boundary
  image: alpine:3.20
  script:
    - sh ci/verify-plugin-repo-template.sh

validate:docs:
  stage: validate-boundary
  image: alpine:3.20
  script:
    - sh ci/verify-doc-independence.sh

build:backend:
  stage: build-backend
  image: *maven_image
  script:
    - echo "mvn -s $MAVEN_SETTINGS_PATH clean install -pl yudream-bootstrap -am -DskipTests -B -e"
    - mvn -s "$MAVEN_SETTINGS_PATH" clean install -pl yudream-bootstrap -am -DskipTests -B -e
  artifacts:
    name: "core-backend-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-bootstrap/target/*.jar
      - yudream-plugins/yudream-plugin-spi/target/*.jar
    expire_in: 1 week

build:frontend-main:
  stage: build-frontend-main
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - pnpm --filter @fantastic-admin/core-arco-design-vue run build
  artifacts:
    name: "core-frontend-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-frontend/apps/core-arco-design-vue/dist/
    expire_in: 1 week

publish:maven-plugin-spi:
  stage: publish-packages
  image: *maven_image
  script:
    - echo "Deploy yudream-plugin-spi to Nexus"
    - mvn -s ci/maven-settings-nexus.xml -f yudream-plugins/yudream-plugin-spi/pom.xml -DskipTests deploy -B -ntp -e
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

verify:maven-plugin-spi:
  stage: verify-packages
  image: *maven_image
  script:
    - sh ci/verify-plugin-spi-registry.sh
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

verify:npm-contracts:
  stage: verify-packages
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - VERIFY_NPM_REGISTRY="$NEXUS_NPM_PUBLIC_URL" sh ci/verify-published-npm-contracts.sh
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

publish:npm-plugin-sdk:
  stage: publish-packages
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - pnpm --filter @yudream/plugin-sdk run build
    - |
      REGISTRY_HOST=$(echo "$NEXUS_NPM_PUBLIC_URL" | sed -E 's#^https?://##' | sed 's#/$##')
      printf '%s\n' \
        "@yudream:registry=$NEXUS_NPM_PUBLIC_URL" \
        "//$REGISTRY_HOST/:username=$NEXUS_USERNAME" \
        "//$REGISTRY_HOST/:_password=$(printf '%s' "$NEXUS_PASSWORD" | base64 | tr -d '\n')" \
        'always-auth=true' > .npmrc
    - cd packages/plugin-sdk
    - pnpm publish --no-git-checks --registry "$NEXUS_NPM_PUBLIC_URL"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

publish:npm-components:
  stage: publish-packages
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - pnpm --filter @yudream/components run build
    - |
      REGISTRY_HOST=$(echo "$NEXUS_NPM_PUBLIC_URL" | sed -E 's#^https?://##' | sed 's#/$##')
      printf '%s\n' \
        "@yudream:registry=$NEXUS_NPM_PUBLIC_URL" \
        "//$REGISTRY_HOST/:username=$NEXUS_USERNAME" \
        "//$REGISTRY_HOST/:_password=$(printf '%s' "$NEXUS_PASSWORD" | base64 | tr -d '\n')" \
        'always-auth=true' > .npmrc
    - cd packages/components
    - pnpm publish --no-git-checks --registry "$NEXUS_NPM_PUBLIC_URL"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

collect:artifacts:
  stage: artifacts
  image: *node_image
  dependencies:
    - build:backend
    - build:frontend-main
  script:
    - mkdir -p dist/backend dist/frontend dist/contracts
    - cp yudream-bootstrap/target/*.jar dist/backend/ || true
    - cp yudream-plugins/yudream-plugin-spi/target/*.jar dist/contracts/ || true
    - cp -r yudream-frontend/apps/core-arco-design-vue/dist dist/frontend/ || true
    - ls -R dist
  artifacts:
    name: "yudream-admin-core-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/
    expire_in: 1 week

build-and-push-images:
  stage: build-images
  image: *docker_cli_image
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  dependencies:
    - build:backend
    - build:frontend-main
  services:
    - name: *docker_dind_image
      alias: docker
  before_script:
    - |
      IMAGE_ROOT="${CORE_IMAGE_REGISTRY:-${CI_REGISTRY_IMAGE:-registry.yudream.online/yudream/yudreamadmin}}"
      REGISTRY_SERVER="${DOCKER_REGISTRY:-${CI_REGISTRY:-$(printf '%s' "$IMAGE_ROOT" | cut -d/ -f1)}}"
      REGISTRY_USER_VALUE="${DOCKER_REGISTRY_USER:-${CI_REGISTRY_USER:-}}"
      REGISTRY_PASSWORD_VALUE="${DOCKER_REGISTRY_PASSWORD:-${CI_REGISTRY_PASSWORD:-}}"
      if [ -z "$REGISTRY_USER_VALUE" ] || [ -z "$REGISTRY_PASSWORD_VALUE" ]; then
        echo "Missing registry credentials. Set DOCKER_REGISTRY_USER/DOCKER_REGISTRY_PASSWORD or use GitLab CI_REGISTRY credentials."
        exit 1
      fi
      echo "$REGISTRY_PASSWORD_VALUE" | docker login "$REGISTRY_SERVER" -u "$REGISTRY_USER_VALUE" --password-stdin
    - docker info
  script:
    - |
      IMAGE_ROOT="${CORE_IMAGE_REGISTRY:-${CI_REGISTRY_IMAGE:-registry.yudream.online/yudream/yudreamadmin}}"
      BACKEND_IMAGE_SHA="$IMAGE_ROOT/backend:$CI_COMMIT_SHORT_SHA"
      FRONTEND_IMAGE_SHA="$IMAGE_ROOT/frontend:$CI_COMMIT_SHORT_SHA"
      BACKEND_IMAGE_TAG="$IMAGE_ROOT/backend:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      FRONTEND_IMAGE_TAG="$IMAGE_ROOT/frontend:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      BACKEND_IMAGE_LATEST="$IMAGE_ROOT/backend:latest"
      FRONTEND_IMAGE_LATEST="$IMAGE_ROOT/frontend:latest"
      docker build -f Dockerfile.backend -t "$BACKEND_IMAGE_SHA" -t "$BACKEND_IMAGE_TAG" -t "$BACKEND_IMAGE_LATEST" .
      docker build -f Dockerfile.frontend -t "$FRONTEND_IMAGE_SHA" -t "$FRONTEND_IMAGE_TAG" -t "$FRONTEND_IMAGE_LATEST" .
      docker push "$BACKEND_IMAGE_SHA"
      docker push "$BACKEND_IMAGE_TAG"
      docker push "$BACKEND_IMAGE_LATEST"
      docker push "$FRONTEND_IMAGE_SHA"
      docker push "$FRONTEND_IMAGE_TAG"
      docker push "$FRONTEND_IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
