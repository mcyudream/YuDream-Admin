# YuDream Admin Core GitLab CI/CD Pipeline

.node_image: &node_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/node:24.15.0-bookworm
.maven_image: &maven_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/maven:3.9-eclipse-temurin-21
.docker_cli_image: &docker_cli_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/docker:cli

default:
  tags:
    - shared

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - when: never

variables:
  PNPM_IGNORE_PACKAGE_MANAGER_VERSION: "true"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_SETTINGS_PATH: "ci/maven-settings.xml"
  NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
  COREPACK_NPM_REGISTRY: "https://registry.npmmirror.com"
  FRONTEND_DIR: "yudream-frontend"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - yudream-frontend/.pnpm-store/
    - .m2/repository/
  policy: pull-push

stages:
  - build-backend
  - build-frontend-main
  - publish-packages
  - artifacts
  - build-images

build:backend:
  stage: build-backend
  image: *maven_image
  script:
    - echo "mvn -s $MAVEN_SETTINGS_PATH clean install -pl yudream-bootstrap -am -DskipTests -B -e"
    - mvn -s "$MAVEN_SETTINGS_PATH" clean install -pl yudream-bootstrap -am -DskipTests -B -e
  artifacts:
    name: "core-backend-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-bootstrap/target/*.jar
      - yudream-plugins/yudream-plugin-spi/target/*.jar
    expire_in: 1 week

build:frontend-main:
  stage: build-frontend-main
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - pnpm --filter @fantastic-admin/core-arco-design-vue run build
  artifacts:
    name: "core-frontend-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-frontend/apps/core-arco-design-vue/dist/
    expire_in: 1 week

publish:maven-plugin-spi:
  stage: publish-packages
  image: *maven_image
  script:
    - |
      GITLAB_MAVEN_REGISTRY="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/maven"
      echo "Deploy yudream-plugin-spi to $GITLAB_MAVEN_REGISTRY"
      mvn -s ci/maven-settings-gitlab.xml -f yudream-plugins/yudream-plugin-spi/pom.xml -DskipTests -DaltDeploymentRepository=gitlab-maven::default::$GITLAB_MAVEN_REGISTRY deploy -B -e
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

publish:npm-plugin-sdk:
  stage: publish-packages
  image: *node_image
  before_script:
    - npm config set registry "$NPM_CONFIG_REGISTRY"
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
    - pnpm config set registry "$NPM_CONFIG_REGISTRY"
    - node -v
    - pnpm -v
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - pnpm --filter @yudream/plugin-sdk run build
    - |
      REGISTRY_HOST=$(echo "$CI_API_V4_URL" | sed -E 's#^https?://##')
      cat > .npmrc <<EOF
      @yudream:registry=$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/npm/
      //$REGISTRY_HOST/projects/$CI_PROJECT_ID/packages/npm/:_authToken=$CI_JOB_TOKEN
      always-auth=true
      EOF
    - cd packages/plugin-sdk
    - pnpm publish --no-git-checks --registry "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/npm/"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

collect:artifacts:
  stage: artifacts
  image: *node_image
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend-main
      artifacts: true
  script:
    - mkdir -p dist/backend dist/frontend dist/contracts
    - cp yudream-bootstrap/target/*.jar dist/backend/ || true
    - cp yudream-plugins/yudream-plugin-spi/target/*.jar dist/contracts/ || true
    - cp -r yudream-frontend/apps/core-arco-design-vue/dist dist/frontend/ || true
    - ls -R dist
  artifacts:
    name: "yudream-admin-core-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/
    expire_in: 1 week

build-and-push-images:
  stage: build-images
  image: *docker_cli_image
  variables:
    CI_REGISTRY_IMAGE: "registry.yudream.online/yudream/yudreamadmin"
    BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    BACKEND_IMAGE_LATEST: "$CI_REGISTRY_IMAGE/backend:latest"
    FRONTEND_IMAGE_LATEST: "$CI_REGISTRY_IMAGE/frontend:latest"
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend-main
      artifacts: true
  before_script:
    - docker info
  script:
    - docker build -f Dockerfile.backend -t "$BACKEND_IMAGE" -t "$BACKEND_IMAGE_LATEST" .
    - docker build -f Dockerfile.frontend -t "$FRONTEND_IMAGE" -t "$FRONTEND_IMAGE_LATEST" .
    - docker push "$BACKEND_IMAGE"
    - docker push "$BACKEND_IMAGE_LATEST"
    - docker push "$FRONTEND_IMAGE"
    - docker push "$FRONTEND_IMAGE_LATEST"
