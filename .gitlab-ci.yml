# YuDream Admin GitLab CI/CD Pipeline
#
# Build outputs:
# - backend app jar: yudream-bootstrap/target/*.jar
# - main frontend dist: yudream-frontend/apps/core-arco-design-vue/dist
# - plugin jars: yudream-plugins/*/target/*.jar
# - plugin frontend dist: yudream-frontend/packages/plugin-*/dist

.node_image: &node_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/node:24.15.0-bookworm
.maven_image: &maven_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/maven:3.9-eclipse-temurin-21
.docker_cli_image: &docker_cli_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/docker:cli
.docker_dind_image: &docker_dind_image swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/docker:dind

default:
  tags:
    - shared

variables:
  PNPM_IGNORE_PACKAGE_MANAGER_VERSION: "true"
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  FRONTEND_DIR: "yudream-frontend"

# 通用缓存：pnpm store + Maven 本地仓库
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - yudream-frontend/.pnpm-store/
    - .m2/repository/
  policy: pull-push

stages:
  - build-frontend-plugins
  - build-backend
  - build-frontend-main
  - artifacts
  - build-images

# 动态构建所有插件前端包，输出到各自 dist/，供 Java 插件打包进 JAR
# 插件列表由 ci/plugins.list 维护；前端包名从各插件 pom.xml 的 <directory> 路径自动解析。
build:frontend-plugins:
  stage: build-frontend-plugins
  image: *node_image
  before_script:
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - |
      # 根据 ci/plugins.list 解析每个插件对应的前端包名
      PLUGIN_FILTERS=""
      while read -r plugin; do
        [ -z "$plugin" ] && continue
        pom="../yudream-plugins/$plugin/pom.xml"
        frontend_pkg=$(grep -oE 'yudream-frontend/packages/[^/]+' "$pom" | head -1 | sed 's|yudream-frontend/packages/||')
        if [ -z "$frontend_pkg" ]; then
          echo "WARN: cannot resolve frontend package for $plugin, skip"
          continue
        fi
        echo "$plugin -> @yudream/$frontend_pkg"
        PLUGIN_FILTERS="$PLUGIN_FILTERS --filter @yudream/$frontend_pkg"
      done < ../ci/plugins.list
      echo "pnpm$PLUGIN_FILTERS run build"
      pnpm $PLUGIN_FILTERS run build
  artifacts:
    name: "frontend-plugin-dists-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-frontend/packages/plugin-*/dist/
    expire_in: 2 hours

# 动态构建 Java 侧：插件 SPI、ci/plugins.list 中列出的插件、框架主体
build:backend:
  stage: build-backend
  image: *maven_image
  needs:
    - job: build:frontend-plugins
      artifacts: true
  script:
    - |
      # 读取插件列表，拼接成 Maven -pl 参数
      PLUGIN_MODULES=""
      while read -r plugin; do
        [ -z "$plugin" ] && continue
        PLUGIN_MODULES="$PLUGIN_MODULES,yudream-plugins/$plugin"
      done < ci/plugins.list
      echo "mvn clean install -pl yudream-bootstrap$PLUGIN_MODULES -am -DskipTests -B -e"
      mvn clean install -pl "yudream-bootstrap$PLUGIN_MODULES" -am -DskipTests -B -e
  artifacts:
    name: "backend-jars-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-bootstrap/target/*.jar
      - yudream-plugins/*/target/*.jar
    expire_in: 1 week

# 构建框架主体前端
build:frontend-main:
  stage: build-frontend-main
  image: *node_image
  before_script:
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
  script:
    - cd "$FRONTEND_DIR"
    - pnpm install --frozen-lockfile
    - pnpm --filter @fantastic-admin/core-arco-design-vue run build
  artifacts:
    name: "frontend-main-dist-${CI_COMMIT_SHORT_SHA}"
    paths:
      - yudream-frontend/apps/core-arco-design-vue/dist/
    expire_in: 1 week

# 汇总产物，方便在 GitLab 页面统一下载
collect:artifacts:
  stage: artifacts
  image: *node_image
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend-main
      artifacts: true
  before_script:
    - corepack enable && corepack prepare pnpm@11.9.0 --activate
  script:
    - cd "$FRONTEND_DIR" && pnpm install --frozen-lockfile
    - mkdir -p dist/backend dist/frontend dist/plugins
    - cp yudream-bootstrap/target/*.jar dist/backend/ || true
    - cp -r yudream-frontend/apps/core-arco-design-vue/dist dist/frontend/ || true
    - cp yudream-plugins/*/target/*.jar dist/plugins/ || true
    - ls -R dist
  artifacts:
    name: "yudream-admin-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/
    expire_in: 1 week

# 构建并推送 backend / frontend Docker 镜像到 GitLab 容器仓库
# 服务端 watchtower 会检测到镜像更新后自动拉取并重启容器。
build-and-push-images:
  stage: build-images
  image: *docker_cli_image
  services:
    - name: *docker_dind_image
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
    FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"
    BACKEND_IMAGE_LATEST: "$CI_REGISTRY_IMAGE/backend:latest"
    FRONTEND_IMAGE_LATEST: "$CI_REGISTRY_IMAGE/frontend:latest"
  needs:
    - job: build:backend
      artifacts: true
    - job: build:frontend-main
      artifacts: true
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f Dockerfile.backend -t "$BACKEND_IMAGE" -t "$BACKEND_IMAGE_LATEST" .
    - docker build -f Dockerfile.frontend -t "$FRONTEND_IMAGE" -t "$FRONTEND_IMAGE_LATEST" .
    - docker push "$BACKEND_IMAGE"
    - docker push "$BACKEND_IMAGE_LATEST"
    - docker push "$FRONTEND_IMAGE"
    - docker push "$FRONTEND_IMAGE_LATEST"
    - echo "Images pushed:"
    - echo "  $BACKEND_IMAGE"
    - echo "  $FRONTEND_IMAGE"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"'
